<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Quake Champions</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">

    <header class="site-header">
      <h1>QUAKE CHAMPIONS</h1>
      <p class="tagline">Map Pick &amp; Ban · Best of 3</p>
    </header>

    <main class="home-main">
      <div class="card auth-card">

        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')"    data-i18n="login_tab">INICIAR SESIÓN</button>
          <button class="auth-tab"        id="tab-register" onclick="switchTab('register')" data-i18n="register_tab">REGISTRARSE</button>
        </div>

        <!-- ── LOGIN ── -->
        <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
          <div class="field">
            <label for="login-email" data-i18n="email">EMAIL</label>
            <input type="email" id="login-email" placeholder="usuario@email.com"
                   required autocomplete="email">
          </div>
          <div class="field">
            <label for="login-password" data-i18n="password">CONTRASEÑA</label>
            <input type="password" id="login-password" placeholder="••••••••"
                   required autocomplete="current-password">
          </div>
          <div class="field-checkbox">
            <label class="checkbox-label">
              <input type="checkbox" id="remember-me" checked>
              <span data-i18n="remember_session">RECORDAR SESIÓN</span>
            </label>
          </div>
          <div id="login-error" class="form-error" style="display:none"></div>
          <div id="login-info"  class="form-info"  style="display:none"></div>
          <button type="submit" class="btn btn-primary" id="login-btn" data-i18n="enter_btn">ENTRAR</button>
        </form>

        <!-- ── REGISTER ── -->
        <form id="form-register" class="auth-form" style="display:none" onsubmit="handleRegister(event)">
          <div class="field">
            <label for="reg-username" data-i18n="quake_name">NOMBRE EN QUAKE</label>
            <input type="text" id="reg-username" data-i18n-placeholder="nick_placeholder" placeholder="Tu nick en el juego"
                   required maxlength="24" autocomplete="off">
          </div>
          <div class="field">
            <label for="reg-email" data-i18n="email">EMAIL</label>
            <input type="email" id="reg-email" placeholder="usuario@email.com"
                   required autocomplete="email">
          </div>
          <div class="field">
            <label for="reg-password" data-i18n="password">CONTRASEÑA</label>
            <input type="password" id="reg-password" data-i18n-placeholder="min_6_chars" placeholder="Mínimo 6 caracteres"
                   required autocomplete="new-password" minlength="6">
          </div>
          <div class="field">
            <label for="reg-confirm" data-i18n="confirm_password">CONFIRMAR CONTRASEÑA</label>
            <input type="password" id="reg-confirm" data-i18n-placeholder="repeat_password" placeholder="Repetí tu contraseña"
                   required autocomplete="new-password">
          </div>
          <div id="reg-error"   class="form-error"   style="display:none"></div>
          <div id="reg-success" class="form-success" style="display:none"></div>
          <button type="submit" class="btn btn-primary" id="reg-btn" data-i18n="create_account">CREAR CUENTA</button>
        </form>

      </div>
    </main>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/version.js"></script>
  <script>
    // ── Redirect destination after login ──────────────────────────────────────
    const nextUrl    = new URLSearchParams(window.location.search).get('next') || 'index.html';
    const unverified = new URLSearchParams(window.location.search).has('unverified');

    // If already logged in, skip login page
    firebase.auth().onAuthStateChanged(function (user) {
      if (user) {
        window.location.href = nextUrl;
      }
    });

    // Show info message for unverified redirects
    if (unverified) {
      const el = document.getElementById('login-info');
      el.textContent   = t('verify_email_msg');
      el.style.display = 'block';
    }

    // ── Tab switching ─────────────────────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
      document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      // Clear messages on tab switch
      ['login-error','login-info','reg-error','reg-success'].forEach(function (id) {
        document.getElementById(id).style.display = 'none';
      });
    }

    function setLoading(btn, loading) {
      btn.disabled      = loading;
      btn.style.opacity = loading ? '0.55' : '';
    }

    // ── Login ─────────────────────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl    = document.getElementById('login-error');
      const infoEl   = document.getElementById('login-info');
      const btn      = document.getElementById('login-btn');

      errEl.style.display  = 'none';
      infoEl.style.display = 'none';
      setLoading(btn, true);

      try {
        const remember = document.getElementById('remember-me').checked;
        await firebase.auth().setPersistence(
          remember ? firebase.auth.Auth.Persistence.LOCAL
                   : firebase.auth.Auth.Persistence.SESSION
        );
        await firebase.auth().signInWithEmailAndPassword(email, password);
        // Reload profile to ensure displayName is available before redirecting
        await firebase.auth().currentUser.reload();
        const u = firebase.auth().currentUser;
        if (u && u.displayName) localStorage.setItem('qc_username', u.displayName);
        window.location.href = nextUrl;

      } catch (err) {
        errEl.textContent   = authErrorMsg(err.code);
        errEl.style.display = 'block';
      } finally {
        setLoading(btn, false);
      }
    }

    // ── Register ──────────────────────────────────────────────────────────────
    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('reg-username').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;
      const errEl    = document.getElementById('reg-error');
      const succEl   = document.getElementById('reg-success');
      const btn      = document.getElementById('reg-btn');

      errEl.style.display  = 'none';
      succEl.style.display = 'none';

      if (!username) {
        errEl.textContent   = t('enter_quake_name');
        errEl.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errEl.textContent   = t('passwords_no_match');
        errEl.style.display = 'block';
        return;
      }

      setLoading(btn, true);

      try {
        const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName: username });
        localStorage.setItem('qc_username', username);
        await cred.user.sendEmailVerification();
        await firebase.auth().signOut();

        succEl.textContent   = t('account_created', { username: username });
        succEl.style.display = 'block';
        document.getElementById('form-register').reset();

      } catch (err) {
        errEl.textContent   = authErrorMsg(err.code);
        errEl.style.display = 'block';
      } finally {
        setLoading(btn, false);
      }
    }

    // ── Error messages ────────────────────────────────────────────────────────
    function authErrorMsg(code) {
      const map = {
        'auth/invalid-email':          'err_invalid_email',
        'auth/user-not-found':         'err_user_not_found',
        'auth/wrong-password':         'err_wrong_password',
        'auth/invalid-credential':     'err_invalid_credential',
        'auth/email-already-in-use':   'err_email_in_use',
        'auth/weak-password':          'err_weak_password',
        'auth/too-many-requests':      'err_too_many_requests',
        'auth/network-request-failed': 'err_network',
      };
      return t(map[code] || 'err_generic');
    }
  </script>
</body>
</html>
