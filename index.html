<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quake Champions — Pick & Ban</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">

    <header class="site-header">
      <h1>QUAKE CHAMPIONS</h1>
      <p class="tagline">Map Pick &amp; Ban · Best of <button id="bo-btn" class="bo-toggle" onclick="window.openSettings()">3</button></p>
    </header>

    <main class="home-main">
      <div class="card form-card">
        <h2 data-i18n="new_match">NUEVA PARTIDA</h2>
        <form id="matchForm">
          <div class="field">
            <label for="p1" data-i18n="player_1">JUGADOR 1</label>
            <input type="text" id="p1" maxlength="24" data-i18n-placeholder="name_placeholder" placeholder="Nombre" autocomplete="off" required>
          </div>
          <div class="field">
            <label for="p2" data-i18n="player_2">JUGADOR 2</label>
            <input type="text" id="p2" maxlength="24" data-i18n-placeholder="name_placeholder" placeholder="Nombre" autocomplete="off" required>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="start_pickban">INICIAR PICK &amp; BAN</button>
          <div id="name-error" class="form-error" style="display:none" data-i18n="names_equal_error">Los nombres no pueden ser iguales.</div>
        </form>
      </div>

      <a href="ranking.html" class="btn btn-secondary" data-i18n="view_ranking">VER RANKING</a>

      <!-- Auth section: login button or user info -->
      <div id="auth-section" class="home-auth-section">
        <!-- Filled by script once auth state resolves -->
      </div>
    </main>

    <!-- SETTINGS MODAL -->
    <div id="settings-modal" class="screenshots-modal">
      <div class="settings-inner">
        <div class="screenshots-header">
          <span class="screenshots-title" data-i18n="settings">CONFIGURACIÓN</span>
          <button class="changelog-close" onclick="window.closeSettings()">✕</button>
        </div>
        <div class="settings-body">
          <div class="settings-group">
            <div class="settings-label" data-i18n="format">FORMATO</div>
            <div class="bo-options">
              <button class="bo-opt" data-bo="1">Bo1</button>
              <button class="bo-opt active" data-bo="3">Bo3</button>
              <button class="bo-opt" data-bo="5">Bo5</button>
            </div>
          </div>
          <div class="settings-group">
            <div class="settings-label-row">
              <span class="settings-label" data-i18n="map_pool">MAPAS ACTIVOS</span>
              <div class="map-toggle-btns">
                <button class="btn-maps-all" onclick="window.settingsToggleAll(true)" data-i18n="select_all">TODOS</button>
                <button class="btn-maps-all" onclick="window.settingsToggleAll(false)" data-i18n="deselect_all">NINGUNO</button>
              </div>
            </div>
            <div id="settings-map-list" class="settings-map-list"></div>
          </div>
          <button class="btn btn-primary settings-apply" onclick="window.applySettings()" data-i18n="apply_settings">APLICAR</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/version.js"></script>
  <script>
    function genSessionId() {
      const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
      let id = '';
      for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
      return id;
    }

    document.getElementById('matchForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const p1  = document.getElementById('p1').value.trim();
      const p2  = document.getElementById('p2').value.trim();
      const err = document.getElementById('name-error');
      if (p1.toLowerCase() === p2.toLowerCase()) {
        err.style.display = 'block';
        document.getElementById('p2').focus();
        return;
      }
      err.style.display = 'none';
      const sid  = genSessionId();
      const bo   = localStorage.getItem('qc_bo') || '3';
      const maps = localStorage.getItem('qc_active_maps') || '';
      window.location.href =
        'pickban.html?session=' + encodeURIComponent(sid) +
        '&player=0&p1=' + encodeURIComponent(p1) + '&p2=' + encodeURIComponent(p2) +
        '&bo=' + bo +
        (maps ? '&maps=' + encodeURIComponent(maps) : '');
    });

    // ── SETTINGS MODAL ──────────────────────────────────────────────────────
    (function () {
      var _bo = 3;

      function updateBoBadge() {
        var btn = document.getElementById('bo-btn');
        if (btn) btn.textContent = _bo;
      }

      function renderMapList() {
        var container = document.getElementById('settings-map-list');
        if (!container) return;
        var savedIds = localStorage.getItem('qc_active_maps');
        var activeSet = savedIds ? new Set(savedIds.split(',').filter(Boolean)) : null;
        container.innerHTML = MAPS.map(function (m) {
          var checked = (!activeSet || activeSet.has(m.id)) ? 'checked' : '';
          return '<label class="map-check-item"><input type="checkbox" value="' + m.id + '" ' + checked + '> ' + m.name + '</label>';
        }).join('');
      }

      function setActiveBoBtn() {
        document.querySelectorAll('.bo-opt').forEach(function (btn) {
          btn.classList.toggle('active', parseInt(btn.getAttribute('data-bo'), 10) === _bo);
        });
      }

      window.openSettings = function () {
        renderMapList();
        setActiveBoBtn();
        var modal = document.getElementById('settings-modal');
        if (modal) { modal.classList.add('open'); window.i18n.apply(); }
      };

      window.closeSettings = function () {
        var modal = document.getElementById('settings-modal');
        if (modal) modal.classList.remove('open');
      };

      window.settingsToggleAll = function (checked) {
        document.querySelectorAll('#settings-map-list input[type=checkbox]').forEach(function (cb) {
          cb.checked = checked;
        });
      };

      window.applySettings = function () {
        var checkedIds = Array.from(
          document.querySelectorAll('#settings-map-list input[type=checkbox]:checked')
        ).map(function (cb) { return cb.value; });
        localStorage.setItem('qc_active_maps', checkedIds.join(','));
        localStorage.setItem('qc_bo', String(_bo));
        updateBoBadge();
        window.closeSettings();
      };

      document.addEventListener('DOMContentLoaded', function () {
        _bo = parseInt(localStorage.getItem('qc_bo') || '3', 10);
        updateBoBadge();

        document.querySelectorAll('.bo-opt').forEach(function (btn) {
          btn.addEventListener('click', function () {
            _bo = parseInt(btn.getAttribute('data-bo'), 10);
            setActiveBoBtn();
          });
        });

        var modal = document.getElementById('settings-modal');
        if (modal) {
          modal.addEventListener('click', function (e) {
            if (e.target === modal) window.closeSettings();
          });
        }
      });
    })();

    // Auth-aware section at the bottom
    firebase.auth().onAuthStateChanged(function (user) {
      const section = document.getElementById('auth-section');
      if (user) {
        // Reload profile to ensure displayName is fresh (may not be cached on first login)
        user.reload().then(function () {
          const freshUser = firebase.auth().currentUser;
          if (!freshUser) return;

          const p1Input = document.getElementById('p1');
          const cachedName = freshUser.displayName || localStorage.getItem('qc_username') || '';
          if (p1Input && !p1Input.value && cachedName) {
            p1Input.value = cachedName;
          }

          const displayName = freshUser.displayName || freshUser.email;
          section.innerHTML =
            '<span class="auth-user-email">' + displayName + '</span>' +
            '<button class="btn-signout" onclick="firebase.auth().signOut().then(function(){localStorage.removeItem(\'qc_username\')})">' + t('logout') + '</button>';
          section.className = 'home-auth-section logged-in';
        });
      } else {
        section.innerHTML =
          '<a href="login.html" class="btn-login-link">' + t('login_register') + '</a>' +
          '<span class="auth-hint">' + t('login_to_save') + '</span>';
        section.className = 'home-auth-section';
      }
    });
  </script>
</body>
</html>
