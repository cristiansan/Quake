<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick &amp; Ban</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">

    <!-- HEADER -->
    <header class="site-header compact">
      <a href="index.html" class="back-link" data-i18n="back_home">← INICIO</a>
      <div class="match-title">
        <span id="p1-name" class="name-p1">Jugador 1</span>
        <span class="vs">VS</span>
        <span id="p2-name" class="name-p2">Jugador 2</span>
      </div>
      <div class="header-right">
        <button id="share-btn" class="btn-share" onclick="copyShareLink()" style="display:none">🔗 P2</button>
        <button type="button" id="bo-badge" class="bo3-badge" onclick="window.openPickbanSettings()">Bo3</button>
      </div>
    </header>

    <!-- LANGUAGE SELECTOR (inline, below match title) -->
    <div id="lang-selector-slot"></div>

    <!-- PLAYER BADGE (shown in multiplayer mode) -->
    <div id="my-player-badge" class="my-player-badge" style="display:none"></div>

    <main>

      <!-- MATCH TRACKER (persists throughout both phases) -->
      <div id="match-tracker" class="match-tracker"></div>

      <!-- PHASE INDICATOR -->
      <div id="phase-indicator" class="phase-indicator phase-maps" data-i18n="phase_maps">FASE DE MAPAS</div>

      <!-- TURN INDICATOR -->
      <div id="turn-bar" class="turn-bar">
        <span id="turn-text" data-i18n="loading">Cargando...</span>
        <span id="step-counter" class="step-counter"></span>
      </div>

      <!-- MAP GRID (visible during map phase) -->
      <div id="map-grid" class="map-grid"></div>

      <!-- CHAMPION GRID (visible during champion phase) -->
      <div id="champ-grid" class="champ-grid" style="display:none"></div>

      <!-- ACTION LOG -->
      <div class="log-section">
        <h3 data-i18n="actions">ACCIONES</h3>
        <ul id="action-log" class="action-log"></ul>
      </div>

      <!-- RESULT SECTION (shown after all phases complete) -->
      <div id="result-section" class="result-section" style="display:none">
        <div class="save-result">
          <h3 data-i18n="register_result">REGISTRAR RESULTADO</h3>

          <div class="winner-select">
            <label class="radio-label">
              <input type="radio" name="winner" value="0">
              <span id="winner-p1-label">Jugador 1</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="winner" value="1">
              <span id="winner-p2-label">Jugador 2</span>
            </label>
          </div>

          <div class="score-select" id="score-radios"></div>

          <button id="copy-btn" onclick="copyResult()" class="btn btn-copy" data-i18n="copy_result">COPY RESULT STRING</button>
          <button id="save-btn" onclick="saveResult()" class="btn btn-primary" data-i18n="save_ranking">GUARDAR Y VER RANKING</button>
          <div id="already-saved-msg" class="already-saved" style="display:none" data-i18n="already_saved">✓ Resultado ya guardado por el otro jugador.</div>
          <div id="anon-save-note" class="anon-save-note" style="display:none">
            <a href="login.html" class="btn-login-link" data-i18n="login_tab">INICIAR SESIÓN</a>
            <span class="auth-hint" data-i18n="login_to_save_global">para guardar en el ranking global</span>
          </div>
          <a href="index.html" class="btn btn-secondary" data-i18n="new_match_no_save">NUEVA PARTIDA (SIN GUARDAR)</a>
        </div>
      </div>

    </main>
  </div>

  <!-- Firebase SDK (compat) — required for multiplayer + auth -->
  <!-- SETTINGS MODAL -->
  <div id="settings-modal" class="screenshots-modal">
    <div class="settings-inner">
      <div class="screenshots-header">
        <span class="screenshots-title" data-i18n="settings">CONFIGURACIÓN</span>
        <button class="changelog-close" onclick="window.closePickbanSettings()">✕</button>
      </div>
      <div class="settings-body">
        <div class="settings-group">
          <div class="settings-label" data-i18n="format">FORMATO</div>
          <div class="bo-options">
            <button class="bo-opt" data-bo="1">Bo1</button>
            <button class="bo-opt active" data-bo="3">Bo3</button>
            <button class="bo-opt" data-bo="5">Bo5</button>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-label-row">
            <span class="settings-label" data-i18n="map_pool">MAPAS ACTIVOS</span>
            <div class="map-toggle-btns">
              <button class="btn-maps-all" onclick="window.settingsToggleAll(true)" data-i18n="select_all">TODOS</button>
              <button class="btn-maps-all" onclick="window.settingsToggleAll(false)" data-i18n="deselect_all">NINGUNO</button>
            </div>
          </div>
          <div id="settings-map-list" class="settings-map-list"></div>
        </div>
        <button class="btn btn-primary settings-apply" onclick="window.applyPickbanSettings()" data-i18n="apply_settings">APLICAR</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/pickban.js"></script>
  <script src="js/version.js"></script>
</body>
</html>
