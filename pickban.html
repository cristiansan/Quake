<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick &amp; Ban</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">

    <!-- HEADER -->
    <header class="site-header compact">
      <a href="index.html" class="back-link">← INICIO</a>
      <div class="match-title">
        <span id="p1-name" class="name-p1">Jugador 1</span>
        <span class="vs">VS</span>
        <span id="p2-name" class="name-p2">Jugador 2</span>
      </div>
      <div class="header-right">
        <button id="share-btn" class="btn-share" onclick="copyShareLink()" style="display:none">🔗 P2</button>
        <span class="bo3-badge">Bo3</span>
      </div>
    </header>

    <!-- PLAYER BADGE (shown in multiplayer mode) -->
    <div id="my-player-badge" class="my-player-badge" style="display:none"></div>

    <main>

      <!-- MATCH TRACKER (persists throughout both phases) -->
      <div id="match-tracker" class="match-tracker"></div>

      <!-- PHASE INDICATOR -->
      <div id="phase-indicator" class="phase-indicator phase-maps">FASE DE MAPAS</div>

      <!-- TURN INDICATOR -->
      <div id="turn-bar" class="turn-bar">
        <span id="turn-text">Cargando...</span>
        <span id="step-counter" class="step-counter"></span>
      </div>

      <!-- MAP GRID (visible during map phase) -->
      <div id="map-grid" class="map-grid"></div>

      <!-- CHAMPION GRID (visible during champion phase) -->
      <div id="champ-grid" class="champ-grid" style="display:none"></div>

      <!-- ACTION LOG -->
      <div class="log-section">
        <h3>ACCIONES</h3>
        <ul id="action-log" class="action-log"></ul>
      </div>

      <!-- RESULT SECTION (shown after all phases complete) -->
      <div id="result-section" class="result-section" style="display:none">
        <div class="save-result">
          <h3>REGISTRAR RESULTADO</h3>

          <div class="winner-select">
            <label class="radio-label">
              <input type="radio" name="winner" value="0">
              <span id="winner-p1-label">Jugador 1</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="winner" value="1">
              <span id="winner-p2-label">Jugador 2</span>
            </label>
          </div>

          <div class="score-select">
            <label class="radio-label">
              <input type="radio" name="score" value="2-0"> 2-0
            </label>
            <label class="radio-label">
              <input type="radio" name="score" value="2-1"> 2-1
            </label>
          </div>

          <button id="copy-btn" onclick="copyResult()" class="btn btn-copy">COPY RESULT STRING</button>
          <button id="save-btn" onclick="saveResult()" class="btn btn-primary">GUARDAR Y VER RANKING</button>
          <div id="already-saved-msg" class="already-saved" style="display:none">✓ Resultado ya guardado por el otro jugador.</div>
          <div id="anon-save-note" class="anon-save-note" style="display:none">
            <a href="login.html" class="btn-login-link">INICIAR SESIÓN</a>
            <span class="auth-hint">para guardar en el ranking global</span>
          </div>
          <a href="index.html" class="btn btn-secondary">NUEVA PARTIDA (SIN GUARDAR)</a>
        </div>
      </div>

    </main>
  </div>

  <!-- Firebase SDK (compat) — required for multiplayer + auth -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/pickban.js"></script>
  <script src="js/version.js"></script>
</body>
</html>
