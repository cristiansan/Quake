<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking — Quake Champions</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">

    <header class="site-header compact">
      <a href="index.html" class="back-link" data-i18n="back_home">← INICIO</a>
      <h1 data-i18n="ranking">RANKING</h1>
      <div style="display:flex;align-items:center;gap:0.5rem">
        <button id="match-counter" class="match-counter-badge" onclick="window.openMatchStats()" data-i18n-title="matches_played">—</button>
        <div id="admin-actions" style="display:none">
          <button onclick="clearData()" class="btn-danger-sm" data-i18n="clear_all">BORRAR TODO</button>
        </div>
        <div id="ranking-auth-actions"></div>
      </div>
    </header>

    <!-- LANGUAGE SELECTOR (inline, below header) -->
    <div id="lang-selector-slot"></div>

    <main class="ranking-main">

      <!-- STANDINGS -->
      <section class="standings-section">
        <h2 data-i18n="standings">TABLA DE POSICIONES</h2>
        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th data-i18n="player_col">JUGADOR</th>
              <th>W — L</th>
              <th>WIN%</th>
            </tr>
          </thead>
          <tbody id="standings-body">
            <tr><td colspan="4" class="empty" data-i18n="loading">Cargando...</td></tr>
          </tbody>
        </table>
      </section>

      <!-- MATCH HISTORY -->
      <section class="history-section">
        <h2 data-i18n="match_history">HISTORIAL DE PARTIDAS</h2>
        <table class="history-table">
          <thead>
            <tr>
              <th data-i18n="date_col">FECHA</th>
              <th data-i18n="match_col">PARTIDA</th>
              <th>SCORE</th>
              <th data-i18n="maps_col">MAPAS</th>
            </tr>
          </thead>
          <tbody id="history-body">
            <tr><td colspan="4" class="empty" data-i18n="loading">Cargando...</td></tr>
          </tbody>
        </table>
      </section>

    </main>
  </div>

  <!-- Match stats modal -->
  <div id="stats-modal" class="screenshots-modal">
    <div class="stats-inner">
      <div class="screenshots-header">
        <span class="screenshots-title" data-i18n="matches_played">PARTIDAS JUGADAS</span>
        <button class="changelog-close" onclick="window.closeMatchStats()">✕</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </div>
  </div>

  <!-- Screenshots modal -->
  <div id="screenshots-modal" class="screenshots-modal">
    <div class="screenshots-inner">
      <div class="screenshots-header">
        <span class="screenshots-title" data-i18n="screenshots">SCREENSHOTS</span>
        <button class="changelog-close" onclick="window.closeScreenshots()">✕</button>
      </div>
      <div id="screenshots-body" class="screenshots-body"></div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ranking.js"></script>
  <script src="js/version.js"></script>
  <script>
    // Auth-aware header
    firebase.auth().onAuthStateChanged(function (user) {
      const container = document.getElementById('ranking-auth-actions');
      if (user) {
        container.innerHTML =
          '<span class="auth-user-email">' + user.email + '</span>' +
          '<button class="btn-signout" onclick="firebase.auth().signOut().then(()=>window.location.reload())">' + t('logout') + '</button>';
        container.className = 'auth-user-bar';
        container.style.marginBottom = '0';

        // Show admin actions if user is the admin
        if (user.email === 'cristiansan@gmail.com') {
          document.getElementById('admin-actions').style.display = 'block';
        }
      } else {
        container.innerHTML = '<a href="login.html" class="btn-login-link">' + t('login_tab') + '</a>';
      }
    });

    // Screenshots modal
    window._screenshotsMap = {};

    window.openScreenshots = function (matchId) {
      const urls = window._screenshotsMap[matchId] || [];
      if (!urls.length) return;
      const body = document.getElementById('screenshots-body');
      body.innerHTML = urls.map(function (url) {
        return '<a href="' + url + '" target="_blank" rel="noopener"><img src="' + url + '" alt="screenshot" loading="lazy"></a>';
      }).join('');
      document.getElementById('screenshots-modal').classList.add('open');
    };

    window.closeScreenshots = function () {
      document.getElementById('screenshots-modal').classList.remove('open');
    };

    // Close modal on backdrop click or Escape
    document.getElementById('screenshots-modal').addEventListener('click', function (e) {
      if (e.target === this) window.closeScreenshots();
    });
    document.getElementById('stats-modal').addEventListener('click', function (e) {
      if (e.target === this) window.closeMatchStats();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        window.closeScreenshots();
        window.closeMatchStats();
      }
    });
  </script>
</body>
</html>
